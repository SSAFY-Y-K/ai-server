name: Build And Deploy AI Image To EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AI_ECR_REPOSITORY: passit-ai-server

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$AI_ECR_REPOSITORY" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$AI_ECR_REPOSITORY" --image-scanning-configuration scanOnPush=true

      - name: Build and push ai-server image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$AI_ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$AI_ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$AI_ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$AI_ECR_REPOSITORY:latest"

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p '${{ secrets.EC2_DEPLOY_ROOT }}/backend' '/opt/passit/ai/chroma_db' '/opt/passit/judge-workspaces'"

      - name: Update AI image tag on EC2
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "cat > '${{ secrets.EC2_DEPLOY_ROOT }}/backend/.env.images.ai' <<'EOF'
AI_SERVER_IMAGE=$REGISTRY/$AI_ECR_REPOSITORY:$IMAGE_TAG
EOF"

      - name: Run Docker Compose deployment
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x '${{ secrets.EC2_DEPLOY_ROOT }}/backend/scripts/deploy-stack.sh' && \
             PASSIT_ROOT='${{ secrets.EC2_DEPLOY_ROOT }}' \
             ENV_FILE='.env.aws' \
             '${{ secrets.EC2_DEPLOY_ROOT }}/backend/scripts/deploy-stack.sh'"
